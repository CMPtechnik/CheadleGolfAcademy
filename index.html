<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheadle Junior Academy Login</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0b3d2e, #145a3c);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            width: 320px;
            text-align: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #0b3d2e;
            margin-bottom: 5px;
        }

        .academy {
            font-size: 13px;
            color: #caa64b;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        h2 {
            margin-bottom: 20px;
            color: #0b3d2e;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #caa64b;
            box-shadow: 0 0 0 2px rgba(202,166,75,0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #caa64b;
            color: #0b3d2e;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #b8933f;
        }

        .error {
            color: #d32f2f;
            font-size: 13px;
            display: none;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="login-container">

    <img src="logologin.png" alt="Cheadle Golf Club Logo" class="logo-img">
    <div class="academy">JUNIOR ACADEMY</div>

    <h2>Login</h2>

    <div class="error" id="errorMsg">Invalid login</div>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="footer">Powered by ForeThought</div>

</div>

<script>
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const validUser = "Juniors";
        const validPass = "Cheadle2026";

        if (username === validUser && password === validPass) {
            window.location.href = "home.html";
        } else {
            document.getElementById('errorMsg').style.display = "block";
        }
    }
</script>

</body>
</html>
