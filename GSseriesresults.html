<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Series Results — Cheadle Juniors</title>
  <link rel="icon" href="favicon.png" type="image/png"/>
  <meta name="theme-color" content="#00c896" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary:#00c896; --primary-dark:#008f6a; --accent:#eafff8;
      --text:#0f172a; --bg:#f8fafc; --card:#ffffff;
      --border:rgba(0,0,0,0.08); --hover:rgba(0,0,0,0.04);
      --radius:14px;
      --shadow-1:0 10px 25px rgba(0,0,0,0.08);
      --shadow-2:0 20px 40px rgba(0,0,0,0.10);
    }
    body {
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%,#d1fae5,transparent),
        radial-gradient(800px 400px at 90% 10%,#ccfbf1,transparent),
        var(--bg);
      color:var(--text);
    }
    header {
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff; padding:1.6rem 1rem 2.6rem; text-align:center;
      border-bottom-left-radius:28px; border-bottom-right-radius:28px;
      box-shadow:0 10px 30px rgba(0,0,0,0.18);
    }
    header h1 { margin:0; font-size:1.6rem; font-weight:900; }
    .sub { margin-top:0.4rem; font-weight:700; opacity:0.9; }
    .controls {
      margin:-1.8rem auto 1.2rem; max-width:1100px; padding:1rem;
      background:var(--card); border-radius:var(--radius);
      box-shadow:var(--shadow-2); border:1px solid var(--border);
      display:flex; gap:1rem; align-items:flex-end; flex-wrap:wrap;
    }
    .controls label { font-weight:800; }
    select, input[type="checkbox"] {
      padding:0.55rem 0.9rem; border-radius:999px;
      border:1px solid var(--border); background:#fff; font-weight:700;
    }
    button {
      padding:0.55rem 0.95rem; border-radius:999px;
      border:none; font-weight:900; cursor:pointer;
    }
    .btn-primary {
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff; box-shadow:var(--shadow-1);
    }
    .btn-primary:hover { transform:translateY(-1px); }
    .right { margin-left:auto; display:flex; gap:0.5rem; flex-wrap:wrap; }
    main { max-width:1100px; margin:auto; padding:1rem; }
    table {
      width:100%; border-collapse:separate; border-spacing:0;
      background:var(--card); border-radius:var(--radius);
      overflow:hidden; box-shadow:var(--shadow-2); border:1px solid var(--border);
    }
    th,td { padding:12px; text-align:center; border-bottom:1px solid var(--border); }
    th { background:var(--accent); text-transform:uppercase; font-size:0.75rem; letter-spacing:0.05em; font-weight:900; }
    tbody tr:hover { background:var(--hover); }
    .winner { background:linear-gradient(90deg,#fff6d8,#ffffff); border-left:5px solid gold; }
    .small { font-size:0.95rem; margin:0.5rem 0 0.5rem 1rem; color:#475569; }
    a { color:var(--primary-dark); text-decoration:none; font-weight:900; }
    .modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      display:none; align-items:center; justify-content:center; z-index:1000;
    }
    .modal {
      background:#fff; padding:16px; border-radius:16px;
      width:min(92vw,820px); max-height:min(90vh,760px);
      overflow:auto; box-shadow:0 12px 40px rgba(0,0,0,.25);
    }
    .close-btn { border:none; background:none; font-size:1.2rem; cursor:pointer; margin-left:auto; display:block; }
    #modalBody { overflow:auto; margin-top:0.5rem; }
    @media(max-width:768px) {
      table { display:block; overflow-x:auto; white-space:nowrap; }
      .controls { flex-direction:column; align-items:stretch; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Season Series Results — Cheadle Juniors</h1>
    <div class="sub">Spring: Apr &amp; May · Summer: Jun, Jul, Aug · Autumn: Sep, Oct, Nov</div>
  </header>

  <div class="controls">
    <div>
      <label for="yearSelect"><strong>Year</strong></label><br/>
      <select id="yearSelect"></select>
    </div>
    <div>
      <label for="seriesSelect"><strong>Series</strong></label><br/>
      <select id="seriesSelect">
        <option value="spring">Spring (Apr &amp; May)</option>
        <option value="summer">Summer (Jun, Jul, Aug)</option>
        <option value="autumn">Autumn (Sep, Oct, Nov)</option>
      </select>
    </div>
    <div>
      <input type="checkbox" id="includeAllToggle" />
      <label for="includeAllToggle">Include all players (not just qualifiers)</label>
    </div>
    <div class="right">
      <a href="home.html"><button class="btn-primary">🏠 Home</button></a>
      <button id="refreshBtn" class="btn-primary">🔁 Refresh</button>
      <button id="exportBtn" class="btn-primary">📁 Export CSV</button>
      <button id="printBtn" class="btn-primary">🖨️ Print</button>
    </div>
  </div>

  <div id="summary" class="small"></div>

  <main>
    <table id="resultsTable">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Player</th>
          <th style="text-align:left">Month Breakdown</th>
          <th>Total Points</th>
          <th>Qualifies</th>
        </tr>
      </thead>
      <tbody id="resultsTbody"></tbody>
    </table>
  </main>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-hidden="true">
    <div class="modal">
      <button class="close-btn" id="modalClose">&times;</button>
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <canvas id="modalChart" height="240" style="margin-top:10px"></canvas>
    </div>
  </div>

  <!-- ── Google Sheets helpers ── -->
  <script>
    const SHEET_ID    = '1mU0_DlUn7cv8henOOHFAnF5dVhMHYmT3eYgrNjniHrs';
    const API_KEY     = 'AIzaSyBTJleDGs7X9184N15_Dm5352WNtWupnYw';
    const SHEETS_BASE = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;

    async function fetchSheet(range) {
      const res = await fetch(`${SHEETS_BASE}/${encodeURIComponent(range)}?key=${API_KEY}`);
      if (!res.ok) throw new Error(`Sheets API ${res.status}`);
      return (await res.json()).values || [];
    }

    function rowsToObjects(rows) {
      if (!rows.length) return [];
      const headers = rows[0];
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h,i) => { obj[h] = row[i] !== undefined ? row[i] : ''; });
        return obj;
      });
    }

    function parseDateStr(v) {
      if (v===null||v===undefined||v==='') return null;
      if (typeof v==='number'&&isFinite(v)&&v>20000&&v<80000)
        return new Date(Math.round((v-25569)*86400*1000));
      if (typeof v==='string') {
        const slash=v.match(/^\s*(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})\s*$/);
        if (slash) { let d=parseInt(slash[1],10),m=parseInt(slash[2],10)-1,y=parseInt(slash[3],10); if(y<100)y+=2000; return new Date(y,m,d); }
        const iso=new Date(v); if(!isNaN(iso)) return iso;
        const p=Date.parse(v.replace(/(\d+)\s+([A-Za-z]+)\s+(\d{4})/,'$1 $2 $3')); if(!isNaN(p)) return new Date(p);
      }
      const d=new Date(v); return isNaN(d.getTime())?null:d;
    }

    function escapeHtml(s) {
      if (!s&&s!==0) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

  <!-- ── Series logic ── -->
  <script>
    const fallbackPoints = [0,10,8,6,5,4,3,2,1];
    const SERIES_MONTHS  = { spring:[4,5], summer:[6,7,8], autumn:[9,10,11] };

    let allRows = [];
    let availableYears = [];
    let currentSeasonFromSettings = null;
    let modalChart = null;

    const yearSelect       = document.getElementById('yearSelect');
    const seriesSelect     = document.getElementById('seriesSelect');
    const includeAllToggle = document.getElementById('includeAllToggle');
    const resultsTbody     = document.getElementById('resultsTbody');
    const summary          = document.getElementById('summary');
    const modalBackdrop    = document.getElementById('modalBackdrop');
    const modalClose       = document.getElementById('modalClose');
    const modalTitle       = document.getElementById('modalTitle');
    const modalBody        = document.getElementById('modalBody');
    const modalChartEl     = document.getElementById('modalChart');

    function getPointsFromRow(r) {
      const raw = String(r.Points||r.points||'').trim();
      const v   = parseFloat(raw);
      if (!isNaN(v)) return v;
      const pos = parseInt(r.Position,10);
      if (!isNaN(pos)&&pos>=1) return pos < fallbackPoints.length ? fallbackPoints[pos] : 1;
      return 0;
    }

    async function init() {
      try {
        // Settings
        const settingsRows = await fetchSheet('Settings!A1:B20');
        settingsRows.forEach(row => {
          if (row[0]&&String(row[0]).toLowerCase().includes('current season')&&row[1]) {
            const maybe=parseInt(row[1]); if(!isNaN(maybe)) currentSeasonFromSettings=maybe;
          }
        });

        // Data
        const dataRows = await fetchSheet('Sheet1!A1:K2000');
        allRows = rowsToObjects(dataRows).filter(r=>String(r.Active||'').toLowerCase()!=='no');

        availableYears = [...new Set(allRows.map(r=>{ const d=parseDateStr(r.Date); return d?d.getFullYear():null; }).filter(Boolean))].sort((a,b)=>b-a);

        yearSelect.innerHTML = availableYears.map(y=>`<option value="${y}">${y}</option>`).join('');

        const thisYear = new Date().getFullYear();
        const defaultYear = availableYears.includes(thisYear) ? thisYear
          : (currentSeasonFromSettings&&availableYears.includes(currentSeasonFromSettings)) ? currentSeasonFromSettings
          : availableYears[0];
        yearSelect.value = defaultYear;

        // Default series by current month
        const nowMo = new Date().getMonth()+1;
        seriesSelect.value = [4,5].includes(nowMo) ? 'spring' : [6,7,8].includes(nowMo) ? 'summer' : 'autumn';

        buildSeriesTable();

      } catch(err) {
        console.error('Load error:',err);
        summary.textContent = `Error loading data: ${err.message}`;
      }
    }

    /* ── Tie-break helpers ── */
    function countWinsInRounds(rounds, monthsSet) {
      return rounds.filter(r=>parseInt(r.Position,10)===1&&monthsSet.has((parseDateStr(r.Date)||new Date()).getMonth()+1)).length;
    }
    function highestSingleRoundPoints(rounds, monthsSet) {
      return Math.max(...rounds.filter(r=>monthsSet.has((parseDateStr(r.Date)||new Date()).getMonth()+1)).map(getPointsFromRow).concat([0]));
    }
    function averageScore(rounds, monthsSet) {
      const vals=rounds.filter(r=>monthsSet.has((parseDateStr(r.Date)||new Date()).getMonth()+1)).map(r=>parseFloat(r.Score)).filter(v=>!isNaN(v));
      if (!vals.length) return null;
      return vals.reduce((a,b)=>a+b,0)/vals.length;
    }
    function headToHeadScore(aRounds, bRounds, monthsSet) {
      const byCompA={}, byCompB={};
      const toComp = (rounds, obj) => rounds.forEach(r=>{ const d=parseDateStr(r.Date); if(!d||!monthsSet.has(d.getMonth()+1)) return; const c=r.Competition||r.Title||''; obj[c]=(obj[c]||[]); obj[c].push(r); });
      toComp(aRounds,byCompA); toComp(bRounds,byCompB);
      let aBetter=0,bBetter=0;
      Object.keys(byCompA).forEach(comp=>{
        if (!byCompB[comp]) return;
        const apos=Math.min(...byCompA[comp].map(r=>parseInt(r.Position)||999));
        const bpos=Math.min(...byCompB[comp].map(r=>parseInt(r.Position)||999));
        if (apos<bpos) aBetter++; else if (bpos<apos) bBetter++;
      });
      return aBetter-bBetter;
    }

    function comparePlayers(a, b, months) {
      if (b.total!==a.total) return b.total-a.total;
      const ms=new Set(months);
      const aW=countWinsInRounds(a.rounds,ms), bW=countWinsInRounds(b.rounds,ms);
      if (bW!==aW) return bW-aW;
      const aH=highestSingleRoundPoints(a.rounds,ms), bH=highestSingleRoundPoints(b.rounds,ms);
      if (bH!==aH) return bH-aH;
      const aA=averageScore(a.rounds,ms), bA=averageScore(b.rounds,ms);
      if (aA!==null&&bA!==null) { if (aA!==bA) return aA-bA; }
      else if (aA!==null) return -1;
      else if (bA!==null) return 1;
      const hh=headToHeadScore(a.rounds,b.rounds,ms);
      if (hh!==0) return -hh;
      return a.name.localeCompare(b.name);
    }

    function buildSeriesTable() {
      const year    = parseInt(yearSelect.value,10);
      const series  = seriesSelect.value;
      const months  = SERIES_MONTHS[series];
      const monthsSet = new Set(months);

      summary.textContent = `Calculating ${series.charAt(0).toUpperCase()+series.slice(1)} series for ${year}…`;

      const seasonRows = allRows.filter(r=>{ const d=parseDateStr(r.Date); return d&&d.getFullYear()===year&&months.includes(d.getMonth()+1); });

      const byPlayer = {};
      seasonRows.forEach(r=>{
        const d=parseDateStr(r.Date); if(!d) return;
        const player=(r.Name||'').trim(); if(!player) return;
        const month=d.getMonth()+1;
        if (!byPlayer[player]) byPlayer[player]={months:{},rounds:[]};
        byPlayer[player].months[month]=(byPlayer[player].months[month]||[]);
        byPlayer[player].months[month].push(r);
        byPlayer[player].rounds.push(r);
      });

      const players = Object.keys(byPlayer).map(name=>{
        const obj=byPlayer[name]; let total=0; const perMonthPoints={};
        months.forEach(m=>{ const cell=obj.months[m]||[]; const pts=cell.reduce((s,row)=>s+getPointsFromRow(row),0); perMonthPoints[m]=pts; total+=pts; });
        const qualifies=months.every(m=>obj.months[m]&&obj.months[m].length>0);
        return {name,perMonthPoints,total,qualifies,rounds:obj.rounds};
      });

      const includeAll=includeAllToggle.checked;
      let shown=includeAll?players:players.filter(p=>p.qualifies);
      shown.sort((a,b)=>{ if (a.qualifies!==b.qualifies) return a.qualifies?-1:1; return comparePlayers(a,b,months); });

      resultsTbody.innerHTML='';
      if (!shown.length) {
        resultsTbody.innerHTML=`<tr><td colspan="5">No entries for ${year} ${series} series.</td></tr>`;
        summary.textContent=`Series: ${series.toUpperCase()} • Year: ${year} • Qualifying: 0`;
        return;
      }

      // Determine winners
      const qualifying=shown.filter(p=>p.qualifies);
      let winners=[];
      if (qualifying.length) {
        const topTotal=Math.max(...qualifying.map(p=>p.total||0));
        let topCandidates=qualifying.filter(p=>p.total===topTotal);
        if (topCandidates.length===1) winners=[topCandidates[0]];
        else {
          topCandidates.sort((a,b)=>comparePlayers(a,b,months));
          const first=topCandidates[0];
          winners=topCandidates.filter(c=>comparePlayers(first,c,months)===0);
        }
      }

      const monthNames=months.map(m=>new Date(year,m-1,1).toLocaleString('en-GB',{month:'short'}));
      shown.forEach((p,idx)=>{
        const tr=document.createElement('tr');
        const isWinner=winners.some(w=>w.name===p.name);
        if (isWinner) tr.classList.add('winner');
        const breakdown=months.map((m,i)=>`${monthNames[i]}: ${p.perMonthPoints[m]||0}`).join(' | ');
        tr.innerHTML=`
          <td>${idx+1}</td>
          <td><a href="#" class="player-link" data-name="${escapeHtml(p.name)}">${escapeHtml(p.name)}</a></td>
          <td style="text-align:left">${escapeHtml(breakdown)}</td>
          <td>${p.total}</td>
          <td>${p.qualifies?'✅':'—'}</td>`;
        resultsTbody.appendChild(tr);
      });

      // Wire player modals
      resultsTbody.querySelectorAll('.player-link').forEach(a=>{
        a.addEventListener('click',ev=>{ ev.preventDefault(); const p=shown.find(x=>x.name===a.dataset.name); if(p) openPlayerModal(p,year,series,months); });
      });

      let summaryText=`Series: <strong>${series.toUpperCase()}</strong> • Year: <strong>${year}</strong> • Qualifying: <strong>${qualifying.length}</strong>`;
      if (winners.length) summaryText+=` • Winner${winners.length>1?'s':''}: <strong>${winners.map(w=>escapeHtml(w.name)).join(', ')}</strong> — ${winners[0].total} pts 🏆`;
      else summaryText+=` • No qualifying winner`;
      summary.innerHTML=summaryText;
    }

    function openPlayerModal(playerObj, year, series, months) {
      modalTitle.textContent=`${playerObj.name} — ${series.charAt(0).toUpperCase()+series.slice(1)} ${year}`;
      const rows=playerObj.rounds.map(r=>{
        const d=parseDateStr(r.Date);
        return { date:d?d.toLocaleDateString('en-GB'):(r.Date||''), competition:r.Title||r.Competition||'', score:r.Score||'', points:getPointsFromRow(r), pos:r.Position||'' };
      }).sort((a,b)=>new Date(a.date)-new Date(b.date));

      modalBody.innerHTML=`
        <table style="width:100%;border-collapse:collapse;margin-top:6px">
          <thead><tr style="background:#f1f1f1">
            <th style="padding:6px">Date</th><th style="padding:6px">Competition</th>
            <th style="padding:6px">Score</th><th style="padding:6px">Points</th><th style="padding:6px">Pos</th>
          </tr></thead>
          <tbody>
            ${rows.map(r=>`<tr>
              <td style="padding:6px">${escapeHtml(r.date)}</td>
              <td style="padding:6px;text-align:left">${escapeHtml(r.competition)}</td>
              <td style="padding:6px">${escapeHtml(r.score)}</td>
              <td style="padding:6px">${r.points}</td>
              <td style="padding:6px">${escapeHtml(r.pos)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;

      const pts=rows.map(r=>r.points);
      const cum=[]; let run=0; pts.forEach(p=>{ run+=p; cum.push(run); });
      const labels=rows.map(r=>`${r.date} · ${r.competition}`);

      if (modalChart) modalChart.destroy();
      modalChart=new Chart(modalChartEl.getContext('2d'),{
        type:'bar',
        data:{labels,datasets:[
          {type:'bar',label:'Points',data:pts,backgroundColor:'#2f7a57'},
          {type:'line',label:'Cumulative',data:cum,borderColor:'#ff8c00',fill:false,tension:0.2}
        ]},
        options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true}}}
      });

      modalBackdrop.style.display='flex';
      modalBackdrop.setAttribute('aria-hidden','false');
    }

    /* ── Export / Print / Events ── */
    document.getElementById('exportBtn').addEventListener('click',()=>{
      const rows=[];
      document.querySelectorAll('#resultsTable tbody tr').forEach(tr=>{
        const tds=tr.querySelectorAll('td');
        if (tds.length<5) return;
        rows.push({Rank:tds[0].innerText.trim(),Player:tds[1].innerText.trim(),Months:tds[2].innerText.trim(),TotalPoints:tds[3].innerText.trim(),Qualifies:tds[4].innerText.trim()});
      });
      if (!rows.length) return alert('No data to export');
      const hdr=Object.keys(rows[0]).join(',');
      const csv=hdr+'\n'+rows.map(r=>Object.values(r).map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob=new Blob([csv],{type:'text/csv'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=`series_${seriesSelect.value}_${yearSelect.value}.csv`;
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    });

    document.getElementById('printBtn').addEventListener('click',()=>window.print());
    document.getElementById('refreshBtn').addEventListener('click',buildSeriesTable);
    yearSelect.addEventListener('change',buildSeriesTable);
    seriesSelect.addEventListener('change',buildSeriesTable);
    includeAllToggle.addEventListener('change',buildSeriesTable);

    modalClose.addEventListener('click',()=>{ modalBackdrop.style.display='none'; modalBackdrop.setAttribute('aria-hidden','true'); if(modalChart){ modalChart.destroy(); modalChart=null; } });
    modalBackdrop.addEventListener('click',e=>{ if(e.target===modalBackdrop){ modalBackdrop.style.display='none'; modalBackdrop.setAttribute('aria-hidden','true'); if(modalChart){ modalChart.destroy(); modalChart=null; } } });

    init();
  </script>
</body>
</html>
