<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cheadle Juniors – Results History</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="favicon.png" sizes="180x180">
  <meta name="theme-color" content="#00c896" />
  <style>
    :root {
      --primary:#00c896; --primary-dark:#008f6a; --accent:#eafff8;
      --text:#0f172a; --bg:#f8fafc; --card:#ffffff;
      --border:rgba(0,0,0,0.08); --hover:rgba(0,0,0,0.04);
      --radius:14px;
      --shadow-1:0 10px 25px rgba(0,0,0,0.08);
      --shadow-2:0 20px 40px rgba(0,0,0,0.10);
    }
    body {
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%,#d1fae5,transparent),
        radial-gradient(800px 400px at 90% 10%,#ccfbf1,transparent),
        var(--bg);
      color:var(--text);
    }
    header {
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff; padding:1.4rem 1rem 2rem; text-align:center;
      border-bottom-left-radius:24px; border-bottom-right-radius:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
    }
    header h1 { margin:0.25rem 0 0; font-size:1.6rem; font-weight:900; }
    .header-sub { margin-top:0.35rem; font-weight:700; opacity:0.9; }
    .nav { margin-top:-1.1rem; display:flex; justify-content:center; gap:0.75rem; flex-wrap:wrap; }
    .nav a {
      background:var(--card); color:var(--text); padding:0.55rem 0.9rem;
      border-radius:999px; text-decoration:none; font-weight:900;
      box-shadow:var(--shadow-1); border:1px solid var(--border);
    }
    .filters {
      margin:1rem auto 0.5rem; text-align:center;
      display:flex; justify-content:center; gap:1rem; flex-wrap:wrap; padding:0 1rem;
    }
    .filters label { font-weight:900; display:block; margin-bottom:0.25rem; }
    select {
      padding:0.6rem 1rem; border-radius:999px; border:1px solid var(--border);
      background:var(--card); font-weight:800; color:var(--text);
    }
    main { max-width:1100px; margin:auto; padding:1rem; }
    section {
      background:var(--card); border-radius:var(--radius);
      box-shadow:var(--shadow-2); border:1px solid var(--border);
      padding:1rem; margin-bottom:1.5rem; position:relative;
    }
    section h2 { margin:0 0 0.5rem; font-size:1.1rem; }
    table { width:100%; border-collapse:separate; border-spacing:0; margin-top:0.5rem; }
    th,td { padding:12px; text-align:center; border-bottom:1px solid var(--border); }
    th { background:var(--accent); text-transform:uppercase; font-size:0.75rem; letter-spacing:0.05em; font-weight:900; }
    tbody tr:hover { background:var(--hover); }
    tbody tr:first-child { background:#ecfdf5; font-weight:800; }
    .print-btn {
      position:absolute; top:0.75rem; right:0.75rem; padding:0.4rem 0.8rem;
      border:none; border-radius:999px; background:var(--primary); color:#fff; font-weight:900; cursor:pointer;
    }
    .loading { text-align:center; padding:2rem; font-weight:700; opacity:0.6; }
    @media print {
      body * { visibility:hidden !important; }
      .print-target,.print-target * { visibility:visible !important; }
      .print-btn { display:none !important; }
      @page { margin:1cm; }
    }
    @media (max-width:768px) { table { display:block; overflow-x:auto; white-space:nowrap; } }
  </style>
</head>
<body>
  <script>if (localStorage.getItem('auth')!=='true') window.location.href='./login.html';</script>

  <header>
    <div class="nav">
      <a href="home.html">🏠 Home</a>
      <a href="#">📊 Results</a>
    </div>
    <h1>Results History</h1>
    <div class="header-sub">⬅️➡️ Scroll to view full table</div>
  </header>

  <div class="filters">
    <div>
      <label for="seasonFilter">Season</label>
      <select id="seasonFilter"></select>
    </div>
    <div>
      <label for="typeFilter">Competition Type</label>
      <select id="typeFilter">
        <option value="all">All Competitions</option>
        <option value="9 hole">9 Hole</option>
        <option value="sixes">Sixes</option>
        <option value="stableford">Stableford</option>
      </select>
    </div>
  </div>

  <main id="content"><div class="loading">Loading results…</div></main>

  <!-- ── Google Sheets helpers ── -->
  <script>
    const SHEET_ID    = '1mU0_DlUn7cv8henOOHFAnF5dVhMHYmT3eYgrNjniHrs';
    const API_KEY     = 'AIzaSyBTJleDGs7X9184N15_Dm5352WNtWupnYw';
    const SHEETS_BASE = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;

    async function fetchSheet(range) {
      const res = await fetch(`${SHEETS_BASE}/${encodeURIComponent(range)}?key=${API_KEY}`);
      if (!res.ok) throw new Error(`Sheets API ${res.status}`);
      return (await res.json()).values || [];
    }

    function rowsToObjects(rows) {
      if (!rows.length) return [];
      const headers = rows[0];
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h,i) => { obj[h] = row[i] !== undefined ? row[i] : ''; });
        return obj;
      });
    }

    function parseDateStr(value) {
      if (!value) return new Date('Invalid');
      if (value instanceof Date && !isNaN(value)) return value;
      if (Number.isFinite(value))
        return new Date(new Date(1899,11,30).getTime() + value * 86400000);
      const text = String(value).trim();
      const slash = text.match(/^\s*(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})\s*$/);
      if (slash) {
        let y=parseInt(slash[3],10); if(y<100) y+=2000;
        return new Date(y, parseInt(slash[2],10)-1, parseInt(slash[1],10));
      }
      const d = new Date(text);
      return isNaN(d.getTime()) ? new Date('Invalid') : d;
    }

    function escapeHtml(v) {
      return String(v??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>

  <!-- ── Results logic ── -->
  <script>
    let allRows = [];
    let currentSeason = null;

    async function loadData() {
      try {
        // Settings
        const settingsRows = await fetchSheet('Settings!A1:B20');
        settingsRows.forEach(row => {
          if (row[0] && String(row[0]).toLowerCase().includes('current season') && row[1]) {
            currentSeason = parseInt(row[1], 10);
          }
        });

        // Data — exclude inactive rows
        const dataRows = await fetchSheet('Sheet1!A1:K2000');
        allRows = rowsToObjects(dataRows).filter(r => String(r.Active||'').toLowerCase() !== 'no');

        // Build season dropdown
        const years = [...new Set(
          allRows.map(r=>parseDateStr(r.Date)).filter(d=>!isNaN(d)).map(d=>d.getFullYear())
        )].sort((a,b)=>b-a);

        const dd = document.getElementById('seasonFilter');
        years.forEach(y => {
          const o = document.createElement('option');
          o.value = y; o.textContent = `${y} Season`; dd.appendChild(o);
        });

        const thisYear = new Date().getFullYear();
        const defaultYear = years.includes(thisYear) ? thisYear
          : (currentSeason && years.includes(currentSeason)) ? currentSeason : years[0];

        dd.value = defaultYear;
        renderSeason(defaultYear);
        dd.onchange = () => renderSeason(dd.value);
        document.getElementById('typeFilter').onchange = () => renderSeason(dd.value);

      } catch(err) {
        console.error('Load error:', err);
        document.getElementById('content').innerHTML = `<p style="text-align:center;">Failed to load results: ${escapeHtml(err.message)}</p>`;
      }
    }

    function renderSeason(year) {
      const c = document.getElementById('content');
      c.innerHTML = '';
      const selectedType = document.getElementById('typeFilter').value;
      const yearInt = parseInt(year, 10);

      const data = allRows.filter(r => {
        const d = parseDateStr(r.Date);
        if (isNaN(d) || d.getFullYear() !== yearInt) return false;
        if (selectedType === 'all') return true;
        return (r.Title||r.Competition||'').toLowerCase().includes(selectedType);
      });

      if (!data.length) {
        c.innerHTML = '<p style="text-align:center;">No results found for this season.</p>'; return;
      }

      // Group by competition title
      const groups = {};
      data.forEach(r => {
        const k = r.Title || r.Competition || 'Unknown';
        (groups[k] = groups[k]||[]).push(r);
      });

      // Sort groups newest first
      Object.keys(groups)
        .sort((a,b) => parseDateStr(groups[b][0].Date) - parseDateStr(groups[a][0].Date))
        .forEach(title => {
          const recs = groups[title];
          const compDate = parseDateStr(recs[0].Date);
          const isStable = title.toLowerCase().includes('stableford');

          // Sort rows
          if (isStable) {
            recs.sort((a,b) => (parseFloat(b['Stableford Points'])||0) - (parseFloat(a['Stableford Points'])||0));
          } else {
            recs.forEach(r => {
              const gross = parseFloat(r.Score||0);
              const hcp   = parseFloat(r['Playing Handicap']||0);
              r._net = hcp>0 ? gross-hcp : gross;
            });
            recs.sort((a,b) => a._net - b._net);
          }
          recs.forEach((r,i) => { r._pos = i+1; });

          // Build section
          const sec = document.createElement('section');
          const h = document.createElement('h2');
          h.textContent = `${title} — ${isNaN(compDate)?'':compDate.toLocaleDateString('en-GB')}`;
          sec.appendChild(h);

          const btn = document.createElement('button');
          btn.textContent = 'Print PDF'; btn.className = 'print-btn';
          btn.onclick = () => {
            document.querySelectorAll('.print-target').forEach(e=>e.classList.remove('print-target'));
            sec.classList.add('print-target'); window.print();
          };
          sec.appendChild(btn);

          const t = document.createElement('table');
          t.innerHTML = `<thead><tr>
            <th>Position</th><th>Name</th>
            ${isStable ? '<th>Stableford</th>' : '<th>Gross</th><th>HCP</th><th>Net</th>'}
            <th>Points</th><th>Trophy</th>
          </tr></thead>`;

          const tb = document.createElement('tbody');
          recs.forEach(r => {
            const pos = r._pos;
            const trophy = pos===1?'🏆':pos===2?'🥈':pos===3?'🥉':'';
            const scoreCell = isStable
              ? `<td>${parseFloat(r['Stableford Points'])||0}</td>`
              : `<td>${r.Score||''}</td><td>${parseFloat(r['Playing Handicap'])||0}</td><td>${r._net!==undefined?r._net:''}</td>`;
            tb.innerHTML += `<tr>
              <td>${pos}</td><td>${escapeHtml(r.Name||'')}</td>
              ${scoreCell}
              <td>${r.Points||''}</td><td>${trophy}</td>
            </tr>`;
          });

          t.appendChild(tb);
          sec.appendChild(t);
          c.appendChild(sec);
        });
    }

    loadData();
  </script>
</body>
</html>
